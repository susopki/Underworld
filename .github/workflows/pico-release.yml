name: Pico APK Release

on:
  workflow_dispatch:
  push:
    tags:
      - "pico-vr-*"

permissions:
  contents: write

jobs:
  build-pico-apk:
    runs-on: ubuntu-24.04

    env:
      GODOT_VERSION: "4.6.3"
      GODOT_STATUS: "stable"
      EXPORT_PRESET: "Pico Android XR"
      APK_PATH: "builds/pico/underworld-pico.apk"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.1" \
            "cmdline-tools;latest" \
            "cmake;3.10.2.4988404" \
            "ndk;28.1.13356709"

      - name: Download Godot
        run: |
          set -euxo pipefail
          GODOT_TAG="${GODOT_VERSION}-${GODOT_STATUS}"
          GODOT_BASE="Godot_v${GODOT_VERSION}-${GODOT_STATUS}"
          curl -L --retry 3 -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_TAG}/${GODOT_BASE}_linux.x86_64.zip"
          unzip -q godot.zip
          mv "${GODOT_BASE}_linux.x86_64" godot
          chmod +x godot

      - name: Install Godot Android export templates
        run: |
          set -euxo pipefail
          GODOT_TAG="${GODOT_VERSION}-${GODOT_STATUS}"
          GODOT_BASE="Godot_v${GODOT_VERSION}-${GODOT_STATUS}"
          curl -L --retry 3 -o export_templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_TAG}/${GODOT_BASE}_export_templates.tpz"
          unzip -q export_templates.tpz -d export_templates
          mkdir -p "${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          cp export_templates/templates/* "${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}/"

      - name: Configure Godot Android export
        run: |
          set -euxo pipefail
          mkdir -p "${HOME}/.config/godot" "${HOME}/.local/share/godot/keystores"
          keytool -genkeypair -v \
            -keystore "${HOME}/.local/share/godot/keystores/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Underworld,O=Underworld,C=RU"
          cat > "${HOME}/.config/godot/editor_settings-4.6.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/debug_keystore = "${HOME}/.local/share/godot/keystores/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Switch project to Pico VR entrypoint
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          p = Path("project.godot")
          text = p.read_text()
          text = text.replace('run/main_scene="res://scenes/Intro.tscn"', 'run/main_scene="res://scenes/MainVR.tscn"')
          text = text.replace('renderer/rendering_method.mobile="gl_compatibility"', 'renderer/rendering_method.mobile="mobile"')
          if 'textures/vram_compression/import_etc2_astc=true' not in text:
              text = text.replace('[rendering]\\n\\n', '[rendering]\\n\\ntextures/vram_compression/import_etc2_astc=true\\n')
          if "[xr]" not in text:
              text += '\n[xr]\n\nxr/openxr/enabled=true\nxr/openxr/startup_alert=false\n'
          p.write_text(text)
          PY

      - name: Install and patch Godot Android Gradle template for Pico VR
        run: |
          set -euxo pipefail
          rm -rf android
          ./godot --headless --path . --install-android-build-template --quit
          find android -maxdepth 6 -type f | sort
          MANIFEST_PATH="$(find android -type f -name AndroidManifest.xml | head -n 1)"
          test -n "${MANIFEST_PATH}"
          python3 platform/pico/patch_godot_android_manifest.py "${MANIFEST_PATH}"
          grep -n "pvr.app.type" "${MANIFEST_PATH}"
          grep -n "com.picovr.intent.category.VR" "${MANIFEST_PATH}"

      - name: Export Pico APK
        run: |
          set -euxo pipefail
          mkdir -p builds/pico
          ./godot --headless --path . --editor --quit
          ./godot --headless --path . --export-debug "${EXPORT_PRESET}" "${APK_PATH}"
          ls -lh "${APK_PATH}"

      - name: Verify final APK is marked as Pico VR
        run: |
          set -euxo pipefail
          AAPT2="${ANDROID_HOME}/build-tools/35.0.1/aapt2"
          "${AAPT2}" dump xmltree "${APK_PATH}" --file AndroidManifest.xml > builds/pico/manifest-dump.txt
          grep -q "pvr.app.type" builds/pico/manifest-dump.txt
          grep -q "com.picovr.intent.category.VR" builds/pico/manifest-dump.txt
          grep -q "org.khronos.openxr.intent.category.IMMERSIVE_HMD" builds/pico/manifest-dump.txt
          sed -n '/pvr.app.type/,+8p' builds/pico/manifest-dump.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: underworld-pico-apk
          path: ${{ env.APK_PATH }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
          name: Underworld Pico VR ${{ github.ref_name }}
          body: |
            Pico sideload APK for Underworld VR.

            Target devices:
            - Pico Neo 3
            - Pico 4

            Install manually with:
            `adb install -r underworld-pico.apk`
